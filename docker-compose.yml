# =============================================================================
# docker-compose.yml — cleudocode-hub com Traefik
# AIDEV-NOTE: Traefik como reverse proxy com HTTPS automático (Let's Encrypt)
# =============================================================================

services:

  # ── Traefik: Reverse Proxy ─────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: cleudo-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"     # Dashboard Traefik (remover em produção)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"          # AIDEV-SECURITY: Desabilitar em produção
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@cleudocode.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Redirecionar HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    networks:
      - cleudo-net
    labels:
      - "traefik.enable=true"

  # ── cleudocode-hub: Framework de Agentes ───────────────────────────────────
  cleudocode-hub:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cleudo-hub
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=19000
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-ollama}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-GandalfBaum/llama3.1-claude3.7:latest}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # AIDEV-SECURITY: Token do Telegram NUNCA hardcoded — sempre via .env
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - hub-docs:/app/docs
    networks:
      - cleudo-net
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub.rule=Host(`hub.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.hub.entrypoints=websecure"
      - "traefik.http.routers.hub.tls.certresolver=letsencrypt"
      - "traefik.http.services.hub.loadbalancer.server.port=19000"
      # Middleware de segurança
      - "traefik.http.middlewares.hub-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.hub-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.hub-headers.headers.frameDeny=true"
      - "traefik.http.routers.hub.middlewares=hub-headers"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:19000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama: LLM Local ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cleudo-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - cleudo-net
    # GPU (descomente se tiver NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Telegram Bot Squad ─────────────────────────────────────────────────────
  cleudo-telegram:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cleudo-telegram-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - CLEUDO_HUB_URL=http://cleudocode-hub:19000
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-ollama}
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - cleudo-net
    depends_on:
      - cleudocode-hub
    command: ["node", "bin/cleudocode.js", "telegram", "start"]

volumes:
  traefik-certs:
    name: cleudo-traefik-certs
  hub-docs:
    name: cleudo-hub-docs
  ollama-data:
    name: cleudo-ollama-data

networks:
  cleudo-net:
    name: cleudo-network
    driver: bridge
